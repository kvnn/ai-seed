services:
  backend:
    build:
      context: .
    env_file:
      - ./.env
    environment:
      - DB_ENGINE_URL=${BACKEND_DB_ENGINE_URL:-sqlite:////data/oahuai.db}
      - OUTPUT_DIR=/data
      - DEPLOYMENT_PUBLIC_BASE_URL=http://backend:8000
    volumes:
      - ./backend:/app/backend
      - ./data:/data
    expose:
      - "8000"
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    working_dir: /frontend
    environment:
      - VITE_API_BASE_URL=
      - VITE_API_PROXY_TARGET=http://backend:8000
    volumes:
      - ./frontend:/frontend
    ports:
      - "${FRONTEND_HOST_PORT:-5176}:5176"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5176"


volumes:
  pgdata:
